[package]
name = "meshtastic-serial-udp"
version = "0.1.0"
edition = "2024"

[dependencies]
aes = "=0.8.4"
clap = { version = "=4.6.0", features = ["derive"] }
env_logger = "=0.11.10"
log = "=0.4.29"
prost = "=0.14.3"
rand = "=0.10.0"
serialport = "=4.9.0"
socket2 = { version = "=0.6.3", features = ["all"] }

[build-dependencies]
prost-build = "=0.14.3"

[profile.release]
strip = true
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

# For targets where pre-built rust-std lacks LLVM bitcode and panic_abort
[profile.release-cross]
inherits = "release"
panic = "unwind"
lto = false
