# Configuration for meshtastic-serial-udp
# This file is sourced by the init script.

# Serial port path (e.g. /dev/ttyUSB0, /dev/ttyACM0)
PORT=/dev/ttyACM0

# Serial baud rate
BAUD=115200

# UDP multicast address
UDP_ADDR=224.0.0.69

# UDP multicast port
UDP_PORT=4403

# Network interface IP to bind multicast socket to
INTERFACE=127.0.0.1
