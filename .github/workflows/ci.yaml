name: ci

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: false

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - mips_24kc
          - mipsel_24kc
          - arm_cortex-a7_neon-vfpv4
          - aarch64_cortex-a53
          - x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Test
        run: |
          ./test.sh ${{ matrix.arch }}

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup default nightly
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libudev-dev
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-results:
    if: always()
    needs: [ test, coverage ]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          results=("${{ needs.test.result }}" "${{ needs.coverage.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed" >&2
              exit 1
            fi
          done
          echo "All tests passed"

  version:
    name: Determine version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Determine version
        id: version
        run: |
          # push to deploy branch returns dev-$SHA
          # tag pushes return the tag
          SHA="$(cut -c-8 <<< "$GITHUB_SHA")"
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "VERSION=dev-${SHA}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == 'refs/tags/'* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "VERSION=${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          fi
      - name: Print version
        run: |
          echo Building version: ${{ steps.version.outputs.VERSION }}

  build:
    needs: [ version ]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - mips_24kc
          - mipsel_24kc
          - arm_cortex-a7_neon-vfpv4
          - aarch64_cortex-a53
          - x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Build
        run: |
          ./build.sh ${{ matrix.arch }}
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
      - name: Determine binary path
        id: binary
        run: |
          source ./hack/arch-config.sh
          configure_arch "${{ matrix.arch }}"
          echo "path=./target/${RUST_TARGET_DIR}/release/meshtastic-serial-udp" >> $GITHUB_OUTPUT
      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.arch }}-bin
          retention-days: 1
          if-no-files-found: error
          path: ${{ steps.binary.outputs.path }}
      - name: Upload apk artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: openwrt-${{ matrix.arch }}-apk
          retention-days: 1
          if-no-files-found: error
          path: ./openwrt/meshtastic-serial-udp_${{ matrix.arch }}.apk
      - name: Upload ipk artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: openwrt-${{ matrix.arch }}-ipk
          retention-days: 1
          if-no-files-found: error
          path: ./openwrt/meshtastic-serial-udp_${{ matrix.arch }}.ipk

  build-results:
    if: always()
    needs: [ build ]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          result="${{ needs.build.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "All builds succeeded"
          else
            echo "One or more builds failed" >&2
            exit 1
          fi

  release:
    needs: [ version, test-results, build-results ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Prepare release assets
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p release
          for arch in mips_24kc mipsel_24kc arm_cortex-a7_neon-vfpv4 aarch64_cortex-a53 x86_64; do
            cp "artifacts/${arch}-bin/meshtastic-serial-udp" \
               "release/meshtastic-serial-udp_${VERSION}_${arch}"
            cp artifacts/openwrt-${arch}-apk/*.apk \
               "release/meshtastic-serial-udp_${VERSION}_${arch}.apk"
            cp artifacts/openwrt-${arch}-ipk/*.ipk \
               "release/meshtastic-serial-udp_${VERSION}_${arch}.ipk"
          done
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          ASSETS=()
          while IFS= read -r f; do ASSETS+=("$f"); done < <(find release -type f | sort)

          if [[ "$GITHUB_REF" == 'refs/tags/'* ]]; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              "${ASSETS[@]}"
          else
            gh release delete dev --yes --cleanup-tag 2>/dev/null || true
            gh release create dev \
              --repo "$GITHUB_REPOSITORY" \
              --title "Development Build (${VERSION})" \
              --prerelease \
              --target "$GITHUB_SHA" \
              "${ASSETS[@]}"
          fi
